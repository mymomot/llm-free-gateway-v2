[server]
listen = "127.0.0.1:8435"
# Chemin du registre SQLite (journalisation + statuts providers).
# Défaut si absent : "./registry.db" (relatif au répertoire de travail).
registry_db = "./registry.db"

# Auth Bearer inbound (FINDING-C1).
# Si présent : lire la valeur de GATEWAY_BEARER_TOKEN et l'exiger sur tous les endpoints
# sauf /health (toujours public pour le monitoring).
# Si absent : aucune auth requise (mode local — ne pas exposer publiquement dans ce cas).
bearer_token_env = "GATEWAY_BEARER_TOKEN"

# Rate limit par IP sur les endpoints POST (chat, embeddings).
# 0 = désactivé. Défaut : 60 req/min.
rate_limit_per_minute = 60

# Circuit breaker par provider.
# circuit_threshold : nombre d'échecs consécutifs avant ouverture (défaut : 5).
# circuit_window_secs : fenêtre temporelle des échecs en secondes (défaut : 60).
# circuit_cooldown_secs : durée du cooldown après ouverture en secondes (défaut : 30).
circuit_threshold = 5
circuit_window_secs = 60
circuit_cooldown_secs = 30

# Cap hard total de tokens par requête chat (input + max_tokens demandé).
# Si le total estimé dépasse ce seuil → HTTP 413 context_length_exceeded.
# Motivation C4 : Qwen3.6 slot ctx réel = 262K (YARN), bug freeze llama-server
# sur cache-bf16 + corpus >200K → cap conservateur à 180K.
# 0 = désactivé (non recommandé en prod Qwen3.6).
# Surridable via env var MAX_TOTAL_TOKENS sans redéploiement config.
max_total_tokens = 180000

[logging]
level = "info"

# Providers — clé = nom du provider, valeur = config endpoint HTTP OpenAI-compat.
[providers.llmcore]
endpoint = "http://192.168.10.118:8080"
timeout_secs = 120
# api_key_env = "LLMCORE_API_KEY"  # optionnel, pas requis pour llmcore local

# Provider embedding — bge-m3 sur llmcore GPU port 8432.
[providers.llmcore-embed]
endpoint = "http://192.168.10.118:8432"
timeout_secs = 60

# Provider fallback OpenRouter — activé si OPENROUTER_API_KEY est définie.
# Utilisé comme fallback quand llmcore est inaccessible (réseau, timeout, erreur 5xx).
# api_key_env : nom de la variable d'env contenant la clé API OpenRouter.
#   Clé disponible sur https://openrouter.ai/settings/keys
#   Commande : export OPENROUTER_API_KEY=sk-or-v1-...
[providers.openrouter]
endpoint = "https://openrouter.ai/api/v1"
timeout_secs = 30
api_key_env = "OPENROUTER_API_KEY"

# Aliases — map model_id demandé → provider + model réel.
#
# Champs disponibles :
#   provider         : nom du provider primary (obligatoire)
#   model            : identifiant de modèle envoyé au provider (obligatoire)
#   fallback_provider: provider tenté si le primary échoue (optionnel)
#   fallback_model   : modèle envoyé au fallback (optionnel, utilise `model` si absent)
#
# Le routing est uniforme pour chat et embeddings : alias = seule clé de dispatch.
[aliases]
# Chat completions — avec fallback OpenRouter si llmcore est down.
"qwen3.5-122b" = { provider = "llmcore", model = "qwen3.5-122b", fallback_provider = "openrouter", fallback_model = "qwen/qwen3-30b-a3b:free" }
"default" = { provider = "llmcore", model = "qwen3.5-122b", fallback_provider = "openrouter", fallback_model = "qwen/qwen3-30b-a3b:free" }

# Embeddings — pas de fallback OR (embedding OR non supporté dans la même chaîne)
"bge-m3" = { provider = "llmcore-embed", model = "bge-m3" }
